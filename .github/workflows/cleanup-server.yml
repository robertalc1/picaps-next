name: Curatenie assets moarte pe server (one-time)

# Sterge de pe server fisierele moarte nereferentiate ramase in public/.
# Se ruleaza MANUAL (workflow_dispatch). Refoloseste secrets-urile FTP existente.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Instaleaza lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Sterge assets moarte prin FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp <<EOF
          set ftp:ssl-allow no
          set ssl:verify-certificate no
          set ftp:passive-mode on
          set net:max-retries 2
          set net:timeout 20
          open "$FTP_SERVER"
          user "$FTP_USERNAME" "$FTP_PASSWORD"
          echo "===== BEFORE: continut public/ ====="
          cls -l public/ || true
          echo "===== Sterg assets moarte ====="
          rm -r -f public/frames-desktop || true
          rm -r -f public/frames-mobile || true
          rm -r -f public/textures || true
          rm -f "public/Vid 2.mp4" || true
          echo "===== AFTER: continut public/ ====="
          cls -l public/ || true
          bye
          EOF
