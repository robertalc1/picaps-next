name: Deploy picaps pe Hosterion (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-picaps-ftp
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalare dependente
        run: npm ci

      - name: Build (next build)
        run: npm run build

      - name: Curata .next de fisiere inutile
        run: |
          rm -rf .next/cache
          rm -rf .next/standalone

      - name: Deploy .next prin FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./.next/
          server-dir: .next/
          dangerous-clean-slate: false

      - name: Pregateste semnalul de restart
        run: |
          mkdir -p restart_signal/tmp
          date -u +'restart-%Y%m%dT%H%M%SZ' > restart_signal/tmp/restart.txt

      - name: Trimite restart prin FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./restart_signal/
          server-dir: ./
          dangerous-clean-slate: false
