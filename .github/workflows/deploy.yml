name: Deploy picaps pe Hosterion

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-picaps
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalare dependente
        run: npm ci

      - name: Build (next build)
        run: npm run build

      - name: Incarca cheia SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy .next + restart (SSH/rsync)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          APP="/home2/picapsro/picaps-app"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete --exclude 'cache' --exclude 'standalone' \
            -e "ssh -p $PORT -o StrictHostKeyChecking=no" \
            ./.next/ \
            "$SSH_USER@$SSH_HOST:$APP/.next/"
          ssh -p "$PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "mkdir -p '$APP/tmp' && date -u +'restart-%Y%m%dT%H%M%SZ' > '$APP/tmp/restart.txt'"
